name: Deploy para GitHub Pages

on:
  push:
    branches: ["main"]

# Permissões cruciais do Git para injetar código na branch Pages automaticamente
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy simultâneo
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Instalar Pacotes
        run: npm ci
      - name: Executar Testes TDD
        run: npm run test -- --run
      - name: Build do Projeto (Vite)
        run: npm run build
      - name: Assinar Arquivos para Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy da URL Pública
        id: deployment
        uses: actions/deploy-pages@v4
